name: Social - Telegram

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mod"
        required: true
        default: "spot"
        type: choice
        options: [spot, digest]
      dry_run:
        description: "Dry run (gondermeden logla)"
        required: false
        default: false
        type: boolean
  schedule:
    # Spot — her 2 saatte bir (UTC)
    - cron: "15 */2 * * *"
    # Digest — TR 09:00 / 15:00 / 20:00  (UTC 06:00 / 12:00 / 17:00)
    - cron: "0 6,12,17 * * *"

concurrency:
  group: social-telegram
  cancel-in-progress: false

jobs:
  telegram:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SOCIAL_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Mod secimi (cron)
        id: pick
        shell: bash
        run: |
          # workflow_dispatch -> kullanici secimi
          # schedule -> cron ifadesinden mod belirlenir
          MODE=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0 6,12,17 * * *" ]; then
            MODE="digest"
          else
            MODE="spot"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Secilen mod: $MODE"

      - name: Telegram Spot
        if: steps.pick.outputs.mode == 'spot'
        run: node scripts/social/telegram-spot.mjs

      - name: Telegram Digest
        if: steps.pick.outputs.mode == 'digest'
        run: node scripts/social/telegram-digest.mjs
