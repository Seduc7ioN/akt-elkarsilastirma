<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
  html,body{width:1080px;height:1920px;background:#0a120a;color:#fff;overflow:hidden}
  body{background:radial-gradient(circle at 50% 30%,#0a2f1c 0%,#0a120a 70%)}
  .top-bar{position:absolute;top:0;left:0;right:0;height:10px;background:linear-gradient(90deg,#10b981 0%,#fbbf24 50%,#f97316 100%)}
  .wrap{padding:90px 70px;height:100%;display:flex;flex-direction:column;position:relative}
  .handle{color:#9ca3af;font-size:28px;margin-bottom:10px}
  .pill{position:absolute;top:80px;right:60px;background:#10b981;color:#fff;font-weight:900;font-size:26px;padding:14px 26px;border-radius:999px}
  .icon{text-align:center;font-size:140px;margin:60px 0 30px}
  .label{text-align:center;font-size:48px;color:#10b981;font-weight:900;letter-spacing:4px;margin-bottom:20px}
  .name{text-align:center;font-size:64px;color:#fff;font-weight:900;margin-bottom:14px;line-height:1.1}
  .meta{text-align:center;color:#9ca3af;font-size:32px;margin-bottom:50px}
  .price-box{background:#1a0f0a;border:4px solid #f97316;border-radius:28px;padding:50px 40px;margin-bottom:50px;text-align:center}
  .oldp{color:#9ca3af;font-size:38px;text-decoration:line-through;margin-bottom:18px}
  .newp{color:#fff;font-size:140px;font-weight:900;letter-spacing:-4px;line-height:1}
  .newp .cur{font-size:72px;vertical-align:top;margin-left:6px}
  .save{background:#0a2a1c;border:2px solid #10b981;border-radius:18px;padding:22px;margin-top:30px}
  .save .l1{color:#10b981;font-size:36px;font-weight:900}
  .save .l2{color:#10b981;font-size:32px;font-weight:800;margin-top:4px}
  .cta{background:#f97316;color:#fff;font-weight:900;font-size:40px;text-align:center;padding:30px;border-radius:20px;letter-spacing:2px;margin-top:auto}
  .footer{text-align:center;margin-top:28px}
  .footer .note{color:#9ca3af;font-size:22px}
  .footer .tags{color:#60a5fa;font-size:24px;margin-top:10px;font-weight:600}
</style></head>
<body>
  <div class="top-bar"></div>
  <div class="wrap">
    <div class="handle">{{handle}}</div>
    <div class="pill">FİYAT DÜŞTÜ!</div>
    <div class="icon">📉</div>
    <div class="label">FİYAT DÜŞTÜ!</div>
    <div class="name">{{productName}}</div>
    <div class="meta">{{marketName}} · {{period}}</div>
    <div class="price-box">
      <div class="oldp">{{oldPrice}} ₺ yerine</div>
      <div class="newp">{{newPrice}}<span class="cur">₺</span></div>
      <div class="save">
        <div class="l1">%{{pct}} İNDİRİM</div>
        <div class="l2">→ {{savingAmount}} ₺ TASARRUF!</div>
      </div>
    </div>
    <div class="cta">👆 Takip Et, Kaçırma!</div>
    <div class="footer">
      <div class="note">Tüketici bilgilendirme</div>
      <div class="tags">{{hashtags}}</div>
    </div>
  </div>
</body></html>
