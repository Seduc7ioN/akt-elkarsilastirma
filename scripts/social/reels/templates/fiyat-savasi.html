<!doctype html>
<html lang="tr"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
  html,body{width:1080px;height:1920px;background:#0a0612;color:#fff;overflow:hidden}
  body{background:radial-gradient(circle at 50% 30%,#2a0818 0%,#0a0612 70%)}
  .wrap{padding:80px 60px;height:100%;display:flex;flex-direction:column}
  .handle{color:#9ca3af;font-size:28px;margin-bottom:10px}
  .date{position:absolute;top:82px;right:60px;color:#9ca3af;font-size:26px}
  .badge{background:#dc2626;color:#fff;font-weight:900;font-size:32px;padding:14px 28px;border-radius:12px;display:inline-block;margin:60px auto 30px;letter-spacing:3px;text-align:center}
  .topline{text-align:center;color:#f87171;font-weight:700;font-size:36px;margin:60px 0 10px;letter-spacing:6px}
  .product{text-align:center;color:#fff;font-size:56px;font-weight:900;margin-bottom:60px;line-height:1.2}
  .battle{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;margin-bottom:50px;position:relative}
  .cheap-badge{position:absolute;top:-34px;left:50%;transform:translateX(-130%);background:#10b981;color:#fff;font-weight:900;font-size:22px;padding:10px 22px;border-radius:20px;white-space:nowrap;z-index:2}
  .card{background:#1a0712;border:3px solid #7f1d1d;border-radius:24px;padding:40px 30px;text-align:center;min-height:360px;display:flex;flex-direction:column;justify-content:center}
  .card.winner{border-color:#10b981;box-shadow:0 0 40px rgba(16,185,129,.4)}
  .card .m{font-size:56px;font-weight:900;color:#ef4444;margin-bottom:28px;letter-spacing:2px}
  .card .p{font-size:88px;font-weight:900;color:#fff}
  .card .u{font-size:36px;color:#9ca3af;margin-top:6px}
  .vs{background:#ff6b00;color:#fff;width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;box-shadow:0 10px 30px rgba(255,107,0,.5)}
  .diff{background:linear-gradient(90deg,#7f1d1d 0%,#3b0a10 100%);border:2px solid #b91c1c;border-radius:24px;padding:40px;text-align:center}
  .diff .t{font-size:56px;font-weight:900;color:#fbbf24;letter-spacing:3px}
  .diff .s{font-size:28px;color:#fca5a5;margin-top:14px}
  .footer{text-align:center;margin-top:40px}
  .footer .note{color:#9ca3af;font-size:22px}
  .footer .tags{color:#60a5fa;font-size:24px;margin-top:10px;font-weight:600}
</style></head>
<body>
  <span class="date">{{dateRange}}</span>
  <div class="wrap">
    <div class="handle">{{handle}}</div>
    <div style="text-align:center"><div class="badge">⚔ FİYAT SAVAŞI</div></div>
    <div class="product">{{productName}}</div>
    <div class="battle">
      <div class="cheap-badge">✓ DAHA UCUZ</div>
      <div class="card winner"><div class="m" style="color:{{leftColor}}">{{leftMarket}}</div><div class="p" style="color:{{leftColor}}">{{leftPrice}}</div><div class="u">₺</div></div>
      <div class="vs">VS</div>
      <div class="card"><div class="m">{{rightMarket}}</div><div class="p">{{rightPrice}}</div><div class="u">₺</div></div>
    </div>
    <div class="diff">
      <div class="t">%{{diffPct}} FARK</div>
      <div class="s">{{leftMarket}} {{diffAmount}} ₺ daha ucuz!</div>
    </div>
    <div class="footer">
      <div class="note">Fiyatlar bilgi amaçlıdır · Stoklarla sınırlıdır</div>
      <div class="tags">{{hashtags}}</div>
    </div>
  </div>
</body></html>
